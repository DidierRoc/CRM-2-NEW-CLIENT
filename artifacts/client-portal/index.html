<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Espace Client Maple</title>
    <meta name="description" content="Espace Client privé Maple">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">
    <link rel="preconnect" href="https://exoisrhuacqeltaucwhu.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://exoisrhuacqeltaucwhu.supabase.co">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #FAF8F5;
        min-height: 100%;
      }
      #root {
        min-height: 100vh;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #FAF8F5;
        z-index: 9999;
        transition: opacity 0.25s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .lx-spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(13,13,13,0.12);
        border-top-color: #0D0D0D;
        border-radius: 50%;
        animation: lx-spin 0.75s linear infinite;
      }
      .lx-wordmark {
        margin-top: 22px;
        font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(13,13,13,0.35);
      }
      @keyframes lx-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="lx-spinner"></div>
      <div class="lx-wordmark">Maple</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
