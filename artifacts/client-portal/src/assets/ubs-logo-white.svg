<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- UBS three-key emblem - white keys, red UBS text (for dark backgrounds) -->
  <g transform="translate(4, 2) scale(1.08)">
    <!-- Center cross hub -->
    <circle cx="26" cy="26" r="4.5" fill="white"/>

    <!-- Vertical shaft top -->
    <rect x="23.8" y="4" width="4.4" height="15" rx="1" fill="white"/>
    <!-- Top key bow (circle) -->
    <circle cx="26" cy="6.5" r="5" fill="none" stroke="white" stroke-width="2.4"/>
    <circle cx="26" cy="6.5" r="2.2" fill="white"/>
    <!-- Top key bits -->
    <rect x="21" y="15" width="4" height="2.5" rx="0.6" fill="white"/>
    <rect x="21" y="11" width="3" height="2.5" rx="0.6" fill="white"/>

    <!-- Vertical shaft bottom -->
    <rect x="23.8" y="33" width="4.4" height="15" rx="1" fill="white"/>
    <!-- Bottom key bits -->
    <rect x="27" y="36" width="4" height="2.5" rx="0.6" fill="white"/>
    <rect x="27" y="40.5" width="3" height="2.5" rx="0.6" fill="white"/>

    <!-- Horizontal shaft left -->
    <rect x="4" y="23.8" width="15" height="4.4" rx="1" fill="white"/>
    <!-- Left key bow -->
    <circle cx="6.5" cy="26" r="5" fill="none" stroke="white" stroke-width="2.4"/>
    <circle cx="6.5" cy="26" r="2.2" fill="white"/>
    <!-- Left key bits -->
    <rect x="15" y="21" width="2.5" height="4" rx="0.6" fill="white"/>
    <rect x="11" y="21" width="2.5" height="3" rx="0.6" fill="white"/>

    <!-- Horizontal shaft right -->
    <rect x="33" y="23.8" width="15" height="4.4" rx="1" fill="white"/>
    <!-- Right key bits -->
    <rect x="35" y="27" width="2.5" height="4" rx="0.6" fill="white"/>
    <rect x="39" y="27" width="2.5" height="3" rx="0.6" fill="white"/>

    <!-- Diagonal NE shaft -->
    <rect x="30" y="8" width="4.2" height="14" rx="1" transform="rotate(45 32 15)" fill="white"/>
    <rect x="36" y="5.5" width="3.5" height="2.5" rx="0.6" transform="rotate(45 37.75 6.75)" fill="white"/>
    <rect x="38" y="9" width="3" height="2.5" rx="0.6" transform="rotate(45 39.5 10.25)" fill="white"/>

    <!-- Diagonal SW shaft -->
    <rect x="14" y="30" width="4.2" height="14" rx="1" transform="rotate(45 16 37)" fill="white"/>
    <rect x="8" y="39.5" width="3.5" height="2.5" rx="0.6" transform="rotate(45 9.75 40.75)" fill="white"/>
    <rect x="10" y="43" width="3" height="2.5" rx="0.6" transform="rotate(45 11.5 44.25)" fill="white"/>

    <!-- Diagonal NW shaft -->
    <rect x="13" y="8" width="4.2" height="14" rx="1" transform="rotate(-45 15 15)" fill="white"/>
    <rect x="6" y="5.5" width="3.5" height="2.5" rx="0.6" transform="rotate(-45 7.75 6.75)" fill="white"/>
    <rect x="4" y="9" width="3" height="2.5" rx="0.6" transform="rotate(-45 5.5 10.25)" fill="white"/>

    <!-- Diagonal SE shaft -->
    <rect x="34" y="30" width="4.2" height="14" rx="1" transform="rotate(-45 36 37)" fill="white"/>
    <rect x="40" y="39.5" width="3.5" height="2.5" rx="0.6" transform="rotate(-45 41.75 40.75)" fill="white"/>
    <rect x="42" y="43" width="3" height="2.5" rx="0.6" transform="rotate(-45 43.5 44.25)" fill="white"/>
  </g>

  <!-- UBS wordmark - bold red -->
  <text x="74" y="43" font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#E30613" letter-spacing="0">UBS</text>
</svg>
